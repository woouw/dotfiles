shadow = true;

shadow-radius = 30;
# shadow-opacity = .5
# shadow-opacity = 0.65;
shadow-offset-x = -30;
shadow-offset-y = -30;
# shadow-offset-x = -10;
# shadow-offset-y = -10;
# @include "../../.cache/wal/picom-shadow-color.conf"
shadow-color = "#000000"

fading = true;

fade-in-step = 0.5;
fade-out-step = 1;
fade-delta = 10;
# no-fading-openclose = false
# no-fading-destroyed-argb = false

corner-radius = 5

backend = "glx";
vsync = true;

unredir-if-possible = false;

detect-client-opacity = true;
use-damage = true;


blur: {
  method = "dual_kawase";
  strength = 5;
  background = true;
  background-frame = false;
  background-fixed = true;
  kern = "3x3box";
}
rules: (

	# {
		# blur-background = false;
		# fade = true;
	# },


  {
		match = "fullscreen";
		corner-radius = 0;
	},

	{
		match = "window_type = 'dock'";
		corner-radius = 0;
		fade = true;
	},
  {
		match = "class_g = 'dmenu'";
		corner-radius = 0;
	},
  {
    match = "class_g = 'Polybar'";
    blur-background = false;
    shadow = false;
	},
	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu' || window_type = 'utility'";
		corner-radius = 0;
    blur-background = false;
    shadow = false;
	},

    {
        # Fix shadow related bugs on small UI elements
        match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        shadow = false;
        blur-background = false;
    },

	{
		match = "class_g = 'Polybar'";
		corner-radius = 4;
    blur-background = false;
	},


# Slide Open/Close
# @include "animations/close/slide.conf"
# @include "animations/open/slide.conf"



# Overshoot Open/Close/Geometry
@include "animations/close/overshoot.conf"
@include "animations/open/overshoot.conf"
@include "animations/geometry/overshoot.conf"




{
match = "window_type = 'normal'"
  animations = (
    {
      triggers = ["show"];
      opacity = {
        curve = "cubic-bezier(0.22,1,0.36,1)";
        duration = 0.7;
        start = 0;
        end = 1;
      };
      blur-opacity = "opacity";
      shadow-opacity = "opacity";
      offset-x = {
          curve = "cubic-bezier(0.22, 1, 0.36, 1)";
          duration = 0.7;
          start = -100;
          end = 0;
      };

      shadow-offset-x = "offset-x";
    },
    {
      triggers = ["hide"];
        opacity = {
          curve = "cubic-bezier(0.22,1,0.36,1)";
          duration = 0.7;
          start = 1;
          end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";
        offset-x = {
          curve = "cubic-bezier(0.22, 1, 0.36, 1)";
          duration = 0.7;
          start = 0;
          end = -100;
        };

        shadow-offset-x = "offset-x";
    }
  )
}

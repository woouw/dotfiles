{
match = "window_type = 'normal'";
  animations = (
    {
      triggers = ["close"];
        opacity = {
          curve = "cubic-bezier(0.22,1,0.36,1)";
          duration = 0.5;
          start = 1;
          end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";

        offset-x = {
          curve = "cubic-bezier(0.22,1.3,0.36,1)";
          duration = 1;
          start = 0;
          end = 0;
        };
        offset-y = {
          curve = "cubic-bezier(0.22,1.3,0.36,1)";
          duration = 1;
          start = 0;
          end = 1000;
        };

        shadow-offset-x = "offset-x";
        shadow-offset-y = "offset-y";
    }
  )
},

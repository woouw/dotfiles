{
        match = "window_type = 'normal'";
        animations = (
            {
                triggers = ["open"];
                opacity = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.85;
                    start = 0.5;
                    end = 1;
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";

                offset-x = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.85;
                    start = 0;
                    end = 0;
                };
                offset-y = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.85;
                    start = 400;
                    end = 0;
                };

                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            },
        )
},

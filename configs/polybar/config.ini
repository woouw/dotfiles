[colors]
background = ${xrdb:color0:#1e1e2e}
foreground = ${xrdb:color7:#cdd6f4}
accent     = ${xrdb:color1:#89b4fa}

[bar/vxwm]
width = 100%:-130
offset-x = 65
offset-y = 2
height = 24
bottom = true
padding-left = 1
padding-right = 1

font-0 = JetBrainsMono Nerd Font:size=11;2

background = ${colors.background}
foreground = ${colors.foreground}

modules-left = tags layout
modules-center = title
modules-right = date

[module/tags]
type = internal/xworkspaces
label-alignment = center
label-active = %name%
label-active-foreground = ${colors.accent}
label-active-background = ${colors.background}
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-empty = %name%
label-empty-foreground = #555555
label-active-padding = 1
label-occupied-padding = 1
label-empty-padding = 1


[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 60

[module/date]
type = internal/date
interval = 1
date = %a %b %d %I:%M %p UTC %Y
label = %date%
